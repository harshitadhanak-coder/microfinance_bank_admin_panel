# Microfinance Admin Panel — nginx site config (runs inside nginx-unprivileged).
# Serves the built SPA and reverse-proxies API traffic to the backend service.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in the Server header.
    server_tokens off;

    # Container health route — static, independent of the backend.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy the REST API to the backend over the internal network.
    # The "api" service is resolved at request time via Docker's embedded DNS
    # (127.0.0.11) through a variable, so nginx still starts if the API is
    # momentarily down and picks up its new IP after an API restart.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream "api:6001";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache fingerprinted static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — client-side routing (react-router) handles unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
